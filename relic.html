<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relic Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #000000;
  --bg2:       #0a0a0a;
  --surface:   rgba(28,28,30,0.8);
  --surface2:  rgba(44,44,46,0.6);
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.05);
  --text:      #ffffff;
  --text2:     rgba(255,255,255,0.6);
  --text3:     rgba(255,255,255,0.3);
  --text4:     rgba(255,255,255,0.12);
  --red:       #ff453a;
  --blue:      #0a84ff;
  --green:     #30d158;
  --amber:     #ffd60a;
  --teal:      #5ac8fa;
  --radius:    14px;
  --radius-sm: 10px;
  --blur:      20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── OUTER FRAME ── */
#frame {
  position: fixed;
  inset: 10px;
  border-radius: 22px;
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 0 0 1px rgba(0,0,0,1),
    0 40px 80px rgba(0,0,0,0.85),
    inset 0 1px 0 rgba(255,255,255,0.05);
  overflow: hidden;
  display: grid;
  grid-template-rows: 80px 1fr;
  grid-template-columns: 1fr 580px;
}

/* ── TOP BAR ── */
#topbar {
  grid-column: 1 / -1;
  height: 80px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  background: rgba(14,14,16,0.85);
}

.nav-link {
  font-size: 12px; font-weight: 400;
  color: var(--text3);
  text-decoration: none;
  letter-spacing: -.01em;
  transition: color .15s;
}
.nav-link:hover { color: var(--blue); }

.page-title {
  font-size: 16px; font-weight: 600;
  letter-spacing: -.04em;
  color: var(--text);
}

.beta-pill {
  font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 20px;
  background: rgba(255,214,10,0.12);
  color: var(--amber);
  letter-spacing: .05em;
  text-transform: uppercase;
}

.spacer { flex: 1; }

.tb-stat {
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 0;
}
.tb-stat-label {
  font-size: 9px; font-weight: 600;
  color: var(--text4); letter-spacing: .06em;
  text-transform: uppercase;
}
.tb-stat-val {
  font-size: 15px; font-weight: 600;
  letter-spacing: -.03em;
  font-variant-numeric: tabular-nums;
  color: var(--text2);
}

.tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

.cur-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 13px; font-weight: 500;
  padding: 5px 10px;
  border-radius: 8px;
  outline: none;
  cursor: pointer;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

/* ── PANELS ── */
#left-panel {
  grid-column: 1; grid-row: 2;
  overflow-y: auto;
  padding: 30px 12px 16px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
#right-panel {
  grid-column: 2; grid-row: 2;
  overflow-y: auto;
  padding: 30px 16px 16px 10px;
  display: flex; flex-direction: column; gap: 10px;
  border-left: 1px solid var(--border2);
}

/* Scrollbar */
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

/* ── GLASS CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  box-shadow: 0 2px 16px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.06);
}

.section-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 12px;
}

/* ── RELIC CARDS ── */
.relic-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.relic-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  box-shadow: 0 2px 12px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.05);
  transition: box-shadow .2s;
}
.relic-card:hover {
  box-shadow: 0 4px 24px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.07);
}

.relic-name {
  font-size: 12px; font-weight: 600;
  letter-spacing: -.01em; margin-bottom: 10px;
}
.relic-name.red   { color: var(--red);   }
.relic-name.blue  { color: var(--blue);  }
.relic-name.green { color: var(--green); }
.relic-name.amber { color: var(--amber); }

.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.input-label { font-size: 11px; font-weight: 500; color: var(--text3); margin-bottom: 4px; letter-spacing: -.01em; }

/* iOS-style input */
.num-wrap { display: flex; align-items: center; }
.num-btn {
  width: 28px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none;
  font-size: 16px; font-weight: 400;
  color: var(--text3);
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  transition: all .15s;
  flex-shrink: 0;
}
.num-btn:hover { color: var(--text2); background: rgba(255,255,255,.07); }
.num-btn:active { transform: scale(.93); }
.num-btn.minus { border-radius: 8px 0 0 8px; border-right: none; }
.num-btn.plus  { border-radius: 0 8px 8px 0; border-left: none; }
.num-wrap input {
  flex: 1; height: 34px;
  border: 1px solid var(--border);
  border-left: none; border-right: none;
  background: rgba(255,255,255,.04);
  color: var(--text);
  font-family: inherit;
  font-size: 14px; font-weight: 500;
  text-align: center; outline: none;
  letter-spacing: -.02em;
  -moz-appearance: textfield;
  font-variant-numeric: tabular-nums;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

/* Result strip */
.result-strip {
  background: rgba(255,255,255,.025);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 9px 11px;
  min-height: 40px;
}

/* Big numbers */
.big-num {
  font-size: 22px; font-weight: 700;
  letter-spacing: -.04em;
  font-variant-numeric: tabular-nums;
}
.big-num.red   { color: var(--red);   }
.big-num.blue  { color: var(--blue);  }
.big-num.green { color: var(--green); }
.big-num.amber { color: var(--amber); }

/* ── BAR ── */
.bar-track {
  height: 20px;
  background: rgba(255,255,255,.04);
  border-radius: 6px;
  overflow: hidden;
  flex: 1;
  border: 1px solid var(--border2);
}
.bar-fill {
  height: 100%;
  border-radius: 6px;
  display: flex; align-items: center;
  transition: width .5s cubic-bezier(.25,.46,.45,.94);
}

/* ── GRAND TOTAL ── */
.grand-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
}
.grand-cell {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.grand-cell-label {
  font-size: 10px; font-weight: 500;
  color: var(--text3); margin-bottom: 4px;
  letter-spacing: .02em; text-transform: uppercase;
}
.grand-cell-val {
  font-size: 22px; font-weight: 700;
  letter-spacing: -.04em;
  font-variant-numeric: tabular-nums;
}

/* ── CHEST ── */
.chest-body {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 10px;
}

.live-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 600;
  color: var(--green); letter-spacing: .02em;
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

/* Tier rows */
.tier-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px;
  border-radius: 8px;
  background: rgba(255,255,255,.02);
  border: 1px solid var(--border2);
  transition: background .15s;
}
.tier-row:hover { background: rgba(255,255,255,.04); }

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spin-anim { animation: spin .8s linear infinite; }

/* Details */
details {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px 14px;
  backdrop-filter: blur(var(--blur));
}
details summary {
  font-size: 11px; font-weight: 600;
  color: var(--text3); cursor: pointer;
  user-select: none; letter-spacing: .03em;
  text-transform: uppercase;
  list-style: none;
}
details summary::-webkit-details-marker { display: none; }

/* Table */
.cost-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 8px; }
.cost-table th { text-align: left; padding: 3px 6px; color: var(--text4); font-weight: 500; font-size: 11px; }
.cost-table th:nth-child(2), .cost-table th:nth-child(4) { text-align: right; }
.cost-table td { padding: 2px 6px; color: var(--text3); font-variant-numeric: tabular-nums; }
.cost-table td:nth-child(2), .cost-table td:nth-child(4) { text-align: right; color: var(--text2); }
.cost-table tr:nth-child(even) td { background: rgba(255,255,255,.015); }
</style>
</head>

<script type="module">
  import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, getDoc, setDoc, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getDatabase, ref, set, onValue, onDisconnect, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const cfg = {
    apiKey:            "AIzaSyAyotrWoly1Xd8qg8-eq97EJoP2Mx8V1To",
    authDomain:        "boss-timer2.firebaseapp.com",
    projectId:         "boss-timer2",
    storageBucket:     "boss-timer2.firebasestorage.app",
    messagingSenderId: "1089834357623",
    appId:             "1:1089834357623:web:3f66c8bfb8aa208eb98772",
    measurementId:     "G-70XPG1283P",
    databaseURL:       "https://boss-timer2-default-rtdb.asia-southeast1.firebasedatabase.app"
  };
  const app  = getApps().length ? getApp() : initializeApp(cfg);
  const db   = getFirestore(app);
  const rtdb = getDatabase(app);

  async function trackVisitor() {
    const r = doc(db, 'stats', 'relic_visitors');
    if (!sessionStorage.getItem('relic_counted')) {
      sessionStorage.setItem('relic_counted', '1');
      await setDoc(r, { count: increment(1) }, { merge: true });
    }
    const s = await getDoc(r);
    if (s.exists()) document.getElementById('total-visitors').textContent = s.data().count.toLocaleString();
  }

  function trackOnline() {
    const sid = Math.random().toString(36).slice(2,10);
    const ur  = ref(rtdb, `presence/relic/${sid}`);
    set(ur, { t: serverTimestamp() });
    onDisconnect(ur).remove();
    onValue(ref(rtdb, 'presence/relic'), s => {
      document.getElementById('online-count').textContent = s.exists() ? Object.keys(s.val()).length : 0;
    });
  }

  trackVisitor(); trackOnline();
</script>

// ── Build relic cards ──
function buildCards() {
  const grid=$('relic-grid');
  for (const r of RELICS) {
    const card=document.createElement('div');
    card.className='relic-card';
    card.innerHTML=`
      <div class="relic-name ${r.color}">${r.name}</div>
      <div class="input-row">
        <div>
          <div class="input-label">Current</div>
          <div class="num-wrap">
            <span class="num-btn minus" data-dir="down">−</span>
            <input id="${r.id}-current" type="number" min="1" max="100" value="1">
            <span class="num-btn plus" data-dir="up">+</span>
          </div>
        </div>
        <div>
          <div class="input-label">Target</div>
          <div class="num-wrap">
            <span class="num-btn minus" data-dir="down">−</span>
            <input id="${r.id}-target" type="number" min="1" max="100" value="1">
            <span class="num-btn plus" data-dir="up">+</span>
          </div>
        </div>
      </div>
      <div class="result-strip" id="${r.id}-result">
        <span style="font-size:12px;color:var(--text4);">Set levels to calculate</span>
      </div>`;
    grid.appendChild(card);
    card.querySelector(`#${r.id}-current`).addEventListener('input',recalcAll);
    card.querySelector(`#${r.id}-target`).addEventListener('input',recalcAll);
  }
}

function getCost(from,to,id) {
  if(from>=to||from<1||to>100) return 0;
  const t=id==='storm'?STORM_COSTS:COSTS;
  let s=0; for(let n=from;n<to;n++) s+=t[n]||0; return s;
}
function getMilestones(id,from,to) {
  const stats=RELIC_STATS[id]; if(!stats) return [];
  const ms=[];
  for(let lv=10;lv<=100;lv+=2)
    if(lv>from&&lv<=to) ms.push({level:lv,stat:stats[((lv-10)/2)%stats.length]});
  return ms;
}

function recalcAll() {
  let gT=0,gU=0,gCP=0;
  for (const r of RELICS) {
    const from=parseInt($(`${r.id}-current`).value)||1;
    const to  =parseInt($(`${r.id}-target`).value)||1;
    const el  =$(`${r.id}-result`);
    if (from>=to){el.innerHTML=`<span style="font-size:12px;color:var(--text4);">Set levels to calculate</span>`;continue;}
    const cost=getCost(from,to,r.id);
    gT+=cost; gU+=to-from;
    const ms=getMilestones(r.id,from,to);
    let mCP=0; for(const m of ms) mCP+=STAT_CP[m.stat]||0;
    let totalCP=mCP, atk=0;
    if(r.id==='destruction'){
      for(let l=from;l<to;l++){let a=3+Math.floor((l-1)/5);if(l%5===0)a++;atk+=a;}
      totalCP+=atk*10;
    }
    gCP+=totalCP;
    const cv=toCur(cost);
    const hex=COLOR_HEX[r.color];

    const totals={};
    for(const m of ms){
      const match=m.stat.match(/^(.+?)\s*[+\-]\s*(.+)$/);
      if(match){const n=match[1].trim(),v=parseFloat(match[2].replace('%','')),isP=match[2].includes('%');if(!totals[n])totals[n]={val:0,isP};totals[n].val+=v;}
    }

    let html=`<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:${ms.length?'8px':'0'};">
      <div style="font-size:20px;font-weight:700;letter-spacing:-.04em;color:${hex};font-variant-numeric:tabular-nums;">${cost.toLocaleString()}</div>
      <div style="text-align:right;">
        <div style="font-size:13px;font-weight:500;color:var(--green);letter-spacing:-.01em;">${fmtCur(cv)}</div>
        ${totalCP>0?`<div style="font-size:11px;color:var(--amber);font-weight:500;">+${totalCP.toLocaleString()} CP</div>`:''}
      </div>
    </div>`;
    if(Object.keys(totals).length){
      html+=`<div style="display:flex;flex-direction:column;gap:2px;">`;
      for(const[n,info]of Object.entries(totals))
        html+=`<div style="display:flex;justify-content:space-between;font-size:11px;">
          <span style="color:var(--text3);">${n}</span>
          <span style="color:${hex};font-weight:500;">+${info.val}${info.isP?'%':''}</span>
        </div>`;
      html+=`</div>`;
    }
    el.innerHTML=html;
  }

  $('grand-temporal').textContent=gT.toLocaleString();
  $('grand-cp').textContent=`+${gCP.toLocaleString()}`;
  $('grand-upgrades').textContent=gU;
  updateBarGraph();
  updateChestAnalysis(gT);
  updateTierBreakdown(gT);
}

function updateBarGraph() {
  const c=$('bar-graph');
  const entries=RELICS.map(r=>{
    const f=parseInt($(`${r.id}-current`)?.value)||1,t=parseInt($(`${r.id}-target`)?.value)||1;
    return{...r,cost:f<t?getCost(f,t,r.id):0,from:f,to:t};
  });
  const max=Math.max(...entries.map(e=>e.cost),1);
  c.innerHTML=entries.map(e=>{
    const pct=(e.cost/max*100).toFixed(1);
    const val=toCur(e.cost);
    const hex=COLOR_HEX[e.color];
    return`<div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;align-items:baseline;">
        <span style="font-size:12px;font-weight:500;color:${hex};">${e.name}</span>
        <span style="font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums;">${fmtCur(val)}</span>
      </div>
      <div class="bar-track">
        ${e.cost>0?`<div class="bar-fill" style="width:${pct}%;background:${BAR_BG[e.color]};border-right:1.5px solid ${hex}40;">
          <span style="font-size:10px;font-weight:600;color:${hex};padding:0 8px;font-variant-numeric:tabular-nums;">${e.cost.toLocaleString()}</span>
        </div>`:`<div style="height:100%;display:flex;align-items:center;padding:0 8px;"><span style="font-size:11px;color:var(--text4);">—</span></div>`}
      </div>
    </div>`;
  }).join('');
}

function updateChestAnalysis(gT) {
  if(gT===undefined) gT=RELICS.reduce((s,r)=>{const f=parseInt($(`${r.id}-current`).value)||1,t=parseInt($(`${r.id}-target`).value)||1;return s+(f<t?getCost(f,t,r.id):0);},0);
  const tier=$('chest-select').value;
  const chest=CHESTS[tier];
  const needed=gT>0?Math.ceil(gT/chest.pieces):0;
  $('chest-label').textContent=chest.label;
  $('chest-sublabel').textContent=`x${chest.pieces.toLocaleString()} Pieces / Chest`;
  $('chests-needed').textContent=needed>0?needed.toLocaleString():'0';
  const cached=cache[tier];
  if(cached){
    const price=currency==='PHP'?cached.php:cached.usdt;
    const suf=currency==='PHP'?' PHP':' USDT';
    $('chest-calc').textContent=needed>0?`${needed} × ${price.toFixed(2)} = ${(needed*price).toFixed(2)}${suf}`:'—';
  } else {
    $('chest-calc').textContent='—';
    fetchPrice(tier);
  }
}

function updateTierBreakdown(gT) {
  if(!gT) gT=0;
  const c=$('tier-breakdown');
  c.innerHTML=Object.entries(CHESTS).map(([tier,chest])=>{
    const needed=gT>0?Math.ceil(gT/chest.pieces):0;
    const cached=cache[tier];
    const price=cached?(currency==='PHP'?cached.php:cached.usdt):null;
    const total=price&&needed?(needed*price).toFixed(2):null;
    const sym=currency==='PHP'?'₱':'';
    const suf=currency==='PHP'?'':' USDT';
    return`<div class="tier-row">
      <span style="font-size:12px;font-weight:600;color:var(--text2);">${chest.label}</span>
      <span style="font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums;">${needed>0?needed.toLocaleString()+' chests':'—'}</span>
      <span style="font-size:12px;color:var(--green);font-weight:500;font-variant-numeric:tabular-nums;">${total?sym+total+suf:cached?'—':'…'}</span>
    </div>`;
  }).join('');
}

const PROXY='/.netlify/functions/market-price';

async function fetchPrice(tier) {
  if(cache[tier]){updateChestAnalysis();return;}
  let php=null,usdt=null;
  try{
    const res=await fetch(`${PROXY}?tier=${tier}`,{signal:AbortSignal.timeout(10000)});
    if(res.ok){const d=await res.json();const item=d?.data?.[tier.toUpperCase()];if(item){php=item.pricePhp;usdt=item.price;}}
  }catch(_){}
  if(php&&usdt){cache[tier]={php,usdt};updateChestAnalysis();updateTierBreakdown();}
}

async function fetchAllTiers(){
  await Promise.all(Object.keys(CHESTS).map(fetchPrice));
  updateTierBreakdown(RELICS.reduce((s,r)=>{const f=parseInt($(`${r.id}-current`).value)||1,t=parseInt($(`${r.id}-target`).value)||1;return s+(f<t?getCost(f,t,r.id):0);},0));
}

async function fetchLivePrice(){
  const el=$('price-status-inner');
  const tier=$('chest-select').value;
  await fetchPrice(tier);
  const c=cache[tier];
  if(c){
    phpPerPiece=cache['t1']?cache['t1'].php/1000:null;
    usdtPerPiece=cache['t1']?cache['t1'].usdt/1000:null;
    const price=currency==='PHP'?c.php:c.usdt;
    const sym=currency==='PHP'?'₱':'';
    const suf=currency==='PHP'?' PHP':' USDT';
    el.innerHTML=`<span class="live-badge"><span class="live-dot"></span>Live</span>
      <span style="font-size:12px;color:var(--text2);font-weight:500;font-variant-numeric:tabular-nums;">${sym}${price.toFixed(2)}${suf} / chest</span>`;
    if(!cache['t1']) await fetchPrice('t1');
    if(cache['t1']){phpPerPiece=cache['t1'].php/1000;usdtPerPiece=cache['t1'].usdt/1000;}
    recalcAll();
    fetchAllTiers();
    clearTimeout(window._pt);
    window._pt=setTimeout(()=>{Object.keys(cache).forEach(k=>delete cache[k]);phpPerPiece=null;usdtPerPiece=null;fetchLivePrice();},120000);
  } else {
    el.innerHTML=`<span style="font-size:12px;color:var(--text4);">Price unavailable</span>
      <button onclick="fetchLivePrice()" style="font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;">Retry</button>`;
  }
}

function buildFullTable(){
  const tbody=$('full-table-body');
  for(let i=1;i<=50;i++){
    const j=i+50;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${i}→${i+1}</td>
      <td>${(COSTS[i]||0).toLocaleString()}</td>
      <td style="padding-left:20px;">${j<=99?j+'→'+(j+1):''}</td>
      <td>${j<=99?(COSTS[j]||0).toLocaleString():''}</td>`;
    tbody.appendChild(tr);
  }
}

// Spinners
document.addEventListener('click',e=>{
  const btn=e.target.closest('.num-btn');if(!btn)return;
  const input=btn.closest('.num-wrap').querySelector('input');
  const min=parseFloat(input.min),max=parseFloat(input.max);
  let val=(parseFloat(input.value)||0)+(btn.dataset.dir==='up'?1:-1);
  val=Math.min(max,Math.max(min,val));
  input.value=val; input.dispatchEvent(new Event('input'));
});
document.addEventListener('change',e=>{
  if(e.target.type!=='number')return;
  let v=parseFloat(e.target.value)||0;
  const min=parseFloat(e.target.min),max=parseFloat(e.target.max);
  if(!isNaN(max)&&v>max)v=max; if(!isNaN(min)&&v<min)v=min;
  e.target.value=v; e.target.dispatchEvent(new Event('input'));
});

buildCards(); buildFullTable(); recalcAll(); fetchLivePrice();
</script>
