<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniCorp — Boss Timer</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
<div id="frame">

  <!-- TOPBAR -->
  <div id="topbar">
    <span class="page-title">Boss Timer</span>
    <span class="beta-pill">Beta</span>
    <a href="/relic" class="nav-link">Relic →</a>
    <div class="tb-sep"></div>
    <input id="boss-filter" type="text" placeholder="Filter bosses…" autocomplete="off" class="tb-filter">

    <!-- Desktop-only controls -->
    <select id="layout-mode" class="glass-select tb-desktop">
      <option value="compact">Compact</option>
      <option value="deck">Deck</option>
    </select>
    <div class="tb-sep tb-desktop"></div>
    <select id="alarm-lead" class="glass-select tb-desktop">
      <option value="3">3m</option>
      <option value="5" selected>5m</option>
      <option value="10">10m</option>
      <option value="15">15m</option>
    </select>
    <div class="tb-sep tb-desktop"></div>
    <input id="alarm-volume" type="range" min="0" max="100" value="80" class="tb-slider tb-desktop">
    <span class="vol-label tb-desktop" id="alarm-volume-label">80%</span>
    <div class="tb-sep tb-desktop"></div>
    <select id="sound-preset" class="glass-select tb-desktop">
      <option value="classic">Classic</option>
      <option value="chimes">Chimes</option>
      <option value="retro">Retro</option>
      <option value="pulse">Pulse</option>
    </select>
    <button id="user-test-alarm" class="tb-btn tb-desktop" title="Test alarm">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
    <button id="toggle-timeline" class="tb-btn tb-desktop" title="Toggle timeline">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><polyline points="8 8 3 12 8 16"/><polyline points="16 8 21 12 16 16"/></svg>
    </button>
    <div class="tb-sep tb-desktop"></div>

    <div class="spacer"></div>

    <!-- Sync status -->
    <div class="sync-wrap">
      <span class="sync-dot syncing" id="sync-dot"></span>
      
      <span class="sync-label tb-desktop" id="sync-label">Loading…</span>
    </div>
    <span id="toast" class="tb-desktop"></span>
    <div class="tb-sep tb-desktop"></div>

    <!-- Visitors + Online — ALWAYS visible -->
    <div class="tb-stat">
      <span class="tb-stat-label">Visitors</span>
      <span class="tb-stat-val" id="visitor-count">—</span>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-stat">
      <span class="tb-stat-label">Online</span>
      <span class="tb-stat-val"><span class="live-dot"></span><span id="online-count">—</span></span>
    </div>

    <!-- Desktop icon buttons -->
    <div class="tb-sep tb-desktop"></div>
    <span id="admin-badge" class="admin-badge" style="display:none;">Admin</span>
    <button id="toggle-admin" class="tb-btn tb-desktop" title="Admin login">
      <svg id="icon-lock" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <svg id="icon-unlock" style="display:none;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 019.9-1"/></svg>
    </button>
    <button id="toggle-mute" class="tb-btn tb-desktop" title="Mute">
      <svg id="icon-unmuted" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
      <svg id="icon-muted" style="display:none;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    </button>
    <button id="btn-refresh" class="tb-btn tb-desktop" title="Refresh">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    </button>

    <!-- Hamburger — mobile only -->
    <div class="tb-sep tb-mobile-only"></div>
    <button id="hamburger-btn" class="tb-btn tb-mobile-only" title="Menu" aria-label="Open menu">
      <svg id="hamburger-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <svg id="hamburger-close" style="display:none;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- HAMBURGER DRAWER (mobile only) -->
  <div id="hamburger-drawer">
    <div class="drawer-row">
      <span class="drawer-label">Layout</span>
      <select id="layout-mode-m" class="glass-select">
        <option value="compact">Compact</option>
        <option value="deck">Deck</option>
      </select>
    </div>
    <div class="drawer-divider"></div>

    <div class="drawer-row">
      <span class="drawer-label">Alarm lead</span>
      <select id="alarm-lead-m" class="glass-select">
        <option value="3">3 min</option>
        <option value="5" selected>5 min</option>
        <option value="10">10 min</option>
        <option value="15">15 min</option>
      </select>
    </div>
    <div class="drawer-divider"></div>

    <div class="drawer-row">
      <span class="drawer-label">Volume</span>
      <div class="drawer-right">
        <input id="alarm-volume-m" type="range" min="0" max="100" value="80" class="tb-slider drawer-slider">
        <span class="vol-label" id="alarm-volume-label-m">80%</span>
      </div>
    </div>
    <div class="drawer-divider"></div>

    <div class="drawer-row">
      <span class="drawer-label">Sound</span>
      <select id="sound-preset-m" class="glass-select">
        <option value="classic">Classic</option>
        <option value="chimes">Chimes</option>
        <option value="retro">Retro</option>
        <option value="pulse">Pulse</option>
      </select>
    </div>
    <div class="drawer-divider"></div>

    <div class="drawer-row drawer-actions">
      <button id="user-test-alarm-m" class="action-btn">🔔 Test</button>
      <button id="toggle-timeline-m" class="action-btn">📅 Timeline</button>
      <button id="toggle-mute-m" class="action-btn" data-muted="false">🔊 Mute</button>
      <button id="btn-refresh-m" class="action-btn">↻ Refresh</button>
    </div>
    <div class="drawer-divider"></div>

    <div class="drawer-row">
      <span class="drawer-label" id="admin-drawer-label">Admin</span>
      <button id="toggle-admin-m" class="action-btn">🔒 Login</button>
    </div>
  </div>

  <!-- ADMIN AREA -->
  <div id="admin-area">
    <textarea id="admin-textarea" placeholder="Paste the bot schedule message here…" rows="4"></textarea>
    <div class="admin-btns">
      <button id="parse" class="action-btn primary">Parse &amp; Save for Everyone</button>
      <button id="test-alarm" class="action-btn">Test alarm</button>
      <button id="test-spawn" class="action-btn">Test spawn (5s)</button>
      <button id="copy-json" class="action-btn">Copy JSON</button>
      <button id="download-ics" class="action-btn">Download ICS</button>
      <button id="toggle-layout" class="action-btn">Deck</button>
    </div>
  </div>

  <!-- MAIN SCROLL -->
  <div id="main">
    <div id="summary"></div>
    <div id="timeline-section" style="display:none;"></div>
    <div id="sections"></div>
  </div>

</div>

<!-- Admin Modal -->
<div id="admin-modal" class="overlay hidden">
  <div class="modal">
    <h3>Admin Login</h3>
    <p>Enter the admin password to unlock boss management.</p>
    <input id="admin-pw" type="password" class="modal-input" placeholder="Password" autocomplete="off">
    <div id="admin-error" class="modal-error">Incorrect password</div>
    <button id="admin-submit" class="modal-submit">Unlock</button>
    <button id="admin-cancel" class="modal-cancel">Cancel</button>
  </div>
</div>

<!-- Spawn overlay -->
<div id="spawn-overlay" class="spawn-overlay">
  <div class="spawn-boss-name" id="spawn-boss-name"></div>
  <div class="spawn-number" id="spawn-number"></div>
  <div class="spawn-sub" id="spawn-sub"></div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
